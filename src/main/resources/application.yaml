spring:
  jackson:
    time-zone: America/Mexico_City
  datasource:
    url: ${DB_URL}?serverTimezone=America/Mexico_City
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect


